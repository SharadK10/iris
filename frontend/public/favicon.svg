<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-label="Iris">
  <!-- A single iris bloom, matching the app palette. -->
  <g transform="translate(50 54) scale(0.5)">
    <!-- falls (drooping outer petals) -->
    <g stroke="#5a4ecf" stroke-width="2" stroke-linejoin="round">
      <path d="M0 0 C -13 -28 -9 -64 0 -86 C 9 -64 13 -28 0 0 Z" fill="#8b7bff" transform="rotate(158) scale(1.08)" />
      <path d="M0 0 C -13 -28 -9 -64 0 -86 C 9 -64 13 -28 0 0 Z" fill="#8b7bff" transform="rotate(180) scale(1.08)" />
      <path d="M0 0 C -13 -28 -9 -64 0 -86 C 9 -64 13 -28 0 0 Z" fill="#8b7bff" transform="rotate(202) scale(1.08)" />
    </g>
    <!-- standards (upright inner petals) -->
    <g stroke="#5a4ecf" stroke-width="2" stroke-linejoin="round">
      <path d="M0 0 C -13 -28 -9 -64 0 -86 C 9 -64 13 -28 0 0 Z" fill="#a79cff" transform="rotate(-26) scale(0.82)" />
      <path d="M0 0 C -13 -28 -9 -64 0 -86 C 9 -64 13 -28 0 0 Z" fill="#a79cff" transform="rotate(0) scale(0.82)" />
      <path d="M0 0 C -13 -28 -9 -64 0 -86 C 9 -64 13 -28 0 0 Z" fill="#a79cff" transform="rotate(26) scale(0.82)" />
    </g>
    <!-- beard / signal -->
    <ellipse cx="0" cy="16" rx="7" ry="14" fill="#e0a92e" />
  </g>
</svg>
